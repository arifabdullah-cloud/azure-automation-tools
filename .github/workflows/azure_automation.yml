name: Azure VM Automation

on:
  schedule:
    - cron: "0 1 * * *"   # daily at 1 AM UTC
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run automation script
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          DRY_RUN: "false"
          CPU_LOOKBACK_MINUTES: "30"
          MIN_SAMPLE_COUNT: "10"
          PROTECTION_TAG_NAME: "doNotShutdown"
          PROTECTION_TAG_VALUE: "true"
        run: |
          python -m automation.shutdown_idle_vms

      - name: Upload JSON reports
        uses: actions/upload-artifact@v7
        with:
          name: vm-automation-reports
          path: "*.json"
          if-no-files-found: ignore

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f shutdown_report.json ]; then
            MESSAGE=$(cat shutdown_report.json)
          else
            MESSAGE="No shutdown_report.json file generated"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MESSAGE"
